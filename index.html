<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calc">
        <div id="screen"> 
            <div class = "old"> </div>
            <div class = "new"> </div>
        </div>
        <div id="buttons">
            <button class = "cline">CE</button>
            <button class = "clear">C</button>
            <button class = "delete">del</button>
            <button class="operation" id = 'd'>÷</button>
            <button class="digit" id = 'seven'>7</button>
            <button class="digit" id = 'eight'>8</button>
            <button class="digit" id = 'nine'>9</button>
            <button class="operation" id = 'm'>×</button>
            <button class="digit" id = 'four'>4</button>
            <button class="digit" id = 'five'>5</button>
            <button class="digit" id = 'six'>6</button>
            <button class="operation" id = 'minus'>-</button>
            <button class="digit" id = 'one'>1</button>
            <button class="digit" id = 'two'>2</button>
            <button class="digit" id = 'three'>3</button>
            <button class="operation" id = 'plus'>+</button>
            <button class="mp">±</button>
            <button class="digit" id = 'zero'>0</button>
            <!-- <button class="filler2"></button> -->
            <button class="digit" id = 'decimal'>.</button>
            <button class="operation" id = 'equals'>=</button>
        </div>
    </div>
    <script src="jscript.js"></script>
</body>
</html>
